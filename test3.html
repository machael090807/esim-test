<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2eSIM My eSIM V5.3</title>
    <style>
        :root { --brand-blue: #24819c; --bg-color: #f2f2f7; --status-yellow: #f2ba49; --red: #ff3b30; --green: #34C759; }
        
        body { font-family: -apple-system, sans-serif; background: var(--bg-color); margin: 0; padding: 0; color: #1c1c1e; -webkit-tap-highlight-color: transparent; }

        /* 頂部導航欄 (安裝頁面專用) */
        .nav-header { display: none; align-items: center; padding: 10px 15px; background: var(--bg-color); position: sticky; top: 0; z-index: 200; }
        .back-btn { font-size: 24px; color: #000; cursor: pointer; text-decoration: none; margin-right: 15px; padding: 5px; }

        .tabs { display: flex; background: #e5e5ea; border-radius: 12px; margin: 15px; padding: 3px; position: sticky; top: 10px; z-index: 100; }
        .tab { flex: 1; padding: 12px; text-align: center; font-size: 14px; cursor: pointer; border-radius: 10px; color: #8e8e93; transition: 0.3s; }
        .tab.active { background: var(--brand-blue); color: #fff; font-weight: bold; }
        
        .esim-list { padding: 0 15px; display: none; }
        .esim-list.active { display: block; }
        .esim-card { background: white; border-radius: 20px; padding: 20px; margin-bottom: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        
        .status-tag { display: inline-block; padding: 4px 10px; border-radius: 8px; font-size: 11px; font-weight: bold; margin-bottom: 12px; border: 1px solid; margin-right: 5px; }
        .tag-active { background: #fff9eb; color: var(--status-yellow); border-color: var(--status-yellow); }
        .tag-transfer { background: #eef7ff; color: var(--brand-blue); border-color: var(--brand-blue); }

        .btn-main { background: var(--brand-blue); color: #fff; border: none; width: 100%; padding: 14px; border-radius: 25px; font-weight: bold; margin-top: 10px; cursor: pointer; transition: 0.2s; }
        .btn-sub { background: #fff; color: var(--brand-blue); border: 1px solid var(--brand-blue); width: 100%; padding: 12px; border-radius: 25px; font-weight: bold; margin-top: 10px; cursor: pointer; }
        .btn-copy { background: var(--brand-blue); color: white; border: none; width: 100%; padding: 14px; border-radius: 12px; font-weight: bold; margin-top: 10px; cursor: pointer; }

        /* 修正後的彈窗：解決跑版與居中問題 */
        .modal-overlay { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.6); z-index: 1000; align-items: center; justify-content: center; 
            padding: 20px; box-sizing: border-box; backdrop-filter: blur(2px);
        }
        .modal { 
            background: white; width: 100%; max-width: 320px; border-radius: 25px; 
            padding: 25px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            animation: modalFadeIn 0.3s ease-out;
        }
        @keyframes modalFadeIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
        
        .modal-icon { width: 40px; height: 40px; border: 2.5px solid var(--status-yellow); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 15px; color: var(--status-yellow); font-weight: bold; font-size: 24px; }
        .modal ul { text-align: left; font-size: 14px; line-height: 1.8; padding-left: 20px; margin-bottom: 25px; color: #3c3c43; }

        /* 安裝引導頁面風格統一 */
        #install-guide { display: none; padding: 0 15px 50px; }
        .qr-section { margin: 15px 0; border: 2px dashed var(--brand-blue); padding: 12px; border-radius: 15px; text-align: center; background: #fff; }
        .qr-image { width: 100%; border-radius: 10px; display: block; }
        .instruction-card { background: #f9fdff; border: 1px solid #dcecf2; border-radius: 15px; padding: 15px; margin-top: 15px; text-align: left; }
    </style>
</head>
<body>

    <div class="nav-header" id="navHeader">
        <div class="back-btn" onclick="location.reload()">‹</div>
        <h3 id="navTitle" style="margin:0; font-size: 18px;">安裝 eSIM</h3>
    </div>

    <h2 id="pageTitle" style="padding: 20px 20px 5px;">My eSIM</h2>

    <div class="tabs" id="mainTabs">
        <div class="tab active" onclick="switchTab(0)">有效</div>
        <div class="tab" onclick="switchTab(1)">失效</div>
        <div class="tab" onclick="switchTab(2)">轉移</div>
    </div>

    <div class="esim-list active" id="list-0">
        <div class="esim-card">
            <span class="status-tag tag-active">尚未開通</span>
            <div class="card-info">
                <h3>南韓 - 7天不限量</h3>
                <p>截止開通：2026-04-10</p>
            </div>
            <button class="btn-main" onclick="openReminderModal('南韓 - 7天不限量')">立即開通</button>
            <button class="btn-sub" onclick="alert('轉移功能演示...')">轉移 eSIM</button>
        </div>
    </div>

    <div class="esim-list" id="list-1"></div>
    <div class="esim-list" id="list-2"></div>

    <div class="modal-overlay" id="reminderModal">
        <div class="modal">
            <div class="modal-icon">!</div>
            <h2 style="margin:0 0 15px;">貼心提醒</h2>
            <ul>
                <li>本方案有效時間將於抵達目的地國產生流量後，開始計算</li>
                <li>eSIM開通後只能於本裝置中使用</li>
                <li>開通 eSIM 需於網路環境下進行開通</li>
                <li>請務必於開通有效期內開通 eSIM</li>
            </ul>
            <button class="btn-main" onclick="goToInstallGuide()">繼續開通</button>
            <button class="btn-sub" style="border:none; color:#8e8e93; margin-top:5px;" onclick="closeModal('reminderModal')">取消開通</button>
        </div>
    </div>

    <div id="install-guide">
        <div class="esim-card" style="margin-top: 10px;">
            <div style="text-align: center;">
                <h3 id="installingName" style="color:var(--brand-blue); margin-top: 0;">南韓 - 7天不限量</h3>
                <div class="qr-section">
                    <img src="qr.jpg" class="qr-image" alt="eSIM QR Code">
                </div>
                <p style="font-size: 13px; color: #8e8e93; margin-bottom: 20px;">請長按 QR Code 儲存至相簿</p>
            </div>

            <div class="instruction-card">
                <p style="font-size: 14px; font-weight: bold; margin-top:0; color:var(--brand-blue);">📋 手動安裝資訊</p>
                <div style="margin-bottom: 15px;">
                    <span style="font-size: 11px; color:#8e8e93;">SM-DP+ 位址</span>
                    <button onclick="copy('rsp-ios.trillium.travel')" class="btn-copy">複製位址</button>
                </div>
                <div>
                    <span style="font-size: 11px; color:#8e8e93;">啟用碼</span>
                    <button onclick="copy('8985207220081270553')" class="btn-copy">複製啟用碼</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentEsimName = '';

        function switchTab(idx) {
            document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', i === idx));
            document.querySelectorAll('.esim-list').forEach((l, i) => l.classList.toggle('active', i === idx));
        }

        function openReminderModal(name) {
            currentEsimName = name;
            document.getElementById('reminderModal').style.display = 'flex';
        }

        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        function goToInstallGuide() {
            closeModal('reminderModal');
            // 隱藏列表組件
            document.getElementById('mainTabs').style.display = 'none';
            document.getElementById('list-0').style.display = 'none';
            document.getElementById('pageTitle').style.display = 'none';
            
            // 顯示頂部導航與安裝內容
            document.getElementById('navHeader').style.display = 'flex';
            document.getElementById('installingName').innerText = currentEsimName;
            document.getElementById('install-guide').style.display = 'block';
            window.scrollTo(0,0);
        }

        function copy(text) {
            navigator.clipboard.writeText(text).then(() => {
                const btn = event.target;
                const originalText = btn.innerText;
                btn.innerText = "✓ 已複製";
                btn.style.background = "#34C759";
                setTimeout(() => {
                    btn.innerText = originalText;
                    btn.style.background = "var(--brand-blue)";
                }, 1500);
            });
        }
    </script>
</body>
</html>
