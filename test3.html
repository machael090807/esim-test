<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2eSIM My eSIM V5.1</title>
    <style>
        :root { --brand-blue: #24819c; --bg-color: #f2f2f7; --status-yellow: #f2ba49; --red: #ff3b30; --green: #34C759; }
        body { font-family: -apple-system, sans-serif; background: var(--bg-color); margin: 0; padding: 0; color: #1c1c1e; overflow-x: hidden; }
        .tabs { display: flex; background: #e5e5ea; border-radius: 12px; margin: 15px; padding: 3px; position: sticky; top: 10px; z-index: 100; }
        .tab { flex: 1; padding: 12px; text-align: center; font-size: 14px; cursor: pointer; border-radius: 10px; color: #8e8e93; }
        .tab.active { background: var(--brand-blue); color: #fff; font-weight: bold; }
        .esim-list { padding: 0 15px; display: none; }
        .esim-list.active { display: block; }
        .esim-card { background: white; border-radius: 20px; padding: 20px; margin-bottom: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .status-tag { display: inline-block; padding: 4px 10px; border-radius: 8px; font-size: 11px; font-weight: bold; margin-bottom: 12px; border: 1px solid; margin-right: 5px; }
        .tag-active { background: #fff9eb; color: var(--status-yellow); border-color: var(--status-yellow); }
        .tag-expired { background: #f2f2f7; color: #8e8e93; border-color: #d1d1d6; }
        .tag-transfer { background: #eef7ff; color: var(--brand-blue); border-color: var(--brand-blue); }
        .card-info h3 { margin: 5px 0; font-size: 17px; }
        .card-info p { margin: 4px 0; font-size: 13px; color: #8e8e93; }
        .btn-main { background: var(--brand-blue); color: #fff; border: none; width: 100%; padding: 12px; border-radius: 25px; font-weight: bold; margin-top: 10px; cursor: pointer; }
        .btn-sub { background: #fff; color: var(--brand-blue); border: 1px solid var(--brand-blue); width: 100%; padding: 10px; border-radius: 25px; font-weight: bold; margin-top: 10px; cursor: pointer; }
        .btn-outline-red { background: #fff; color: var(--red); border: 1px solid var(--red); width: 100%; padding: 10px; border-radius: 25px; font-weight: bold; margin-top: 10px; cursor: pointer; }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 1000; align-items: center; justify-content: center; padding: 20px; box-sizing: border-box; }
        .modal { background: white; width: 100%; max-width: 320px; border-radius: 25px; padding: 25px; text-align: center; }
        .modal input { width: 100%; padding: 12px; margin: 15px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; }
    </style>
</head>
<body>

    <h2 style="padding: 20px;">My eSIM</h2>

    <div class="tabs">
        <div class="tab active" onclick="switchTab(0)">有效</div>
        <div class="tab" onclick="switchTab(1)">失效</div>
        <div class="tab" onclick="switchTab(2)">轉移</div>
    </div>

    <div class="esim-list active" id="list-0">
        <div class="esim-card" id="card-my-skt">
            <span class="status-tag tag-active">尚未開通</span>
            <div class="card-info">
                <h3>南韓 - 7天不限量</h3>
                <p>截止開通：2026-04-10</p>
            </div>
            <button class="btn-main" onclick="openActiveModal()">立即開通</button>
            <button class="btn-sub" onclick="openTransferModal('card-my-skt', '南韓 - 7天不限量')">轉移 eSIM</button>
        </div>

        <div class="esim-card" id="card-received-jp">
            <span class="status-tag tag-active">尚未開通</span>
            <span class="status-tag tag-transfer">轉移</span>
            <div class="card-info">
                <h3>日本 - 5天 每日1GB (來自: Kevin)</h3>
                <p>截止開通：2026-03-30</p>
            </div>
            <button class="btn-main" onclick="openActiveModal()">立即開通</button>
            <button class="btn-sub" onclick="openTransferModal('card-received-jp', '日本 - 5天 (來自: Kevin)')">轉移 eSIM</button>
            <button class="btn-outline-red" onclick="returnOrder('card-received-jp')">退回</button>
        </div>
    </div>

    <div class="esim-list" id="list-1">
        <div class="esim-card">
            <span class="status-tag tag-expired">已退回</span>
            <div class="card-info">
                <h3>泰國 - 10天 吃到飽</h3>
                <p>退回時間：<span class="current-time"></span></p>
            </div>
        </div>
        <div class="esim-card">
            <span class="status-tag tag-expired">已過期</span>
            <span class="status-tag tag-transfer">轉移</span>
            <div class="card-info">
                <h3>越南 - 3天 總量3GB (來自: Amy)</h3>
                <p>過期時間：2026-03-10 23:59</p>
            </div>
        </div>
    </div>

    <div class="esim-list" id="list-2">
        <div class="esim-card" id="transferring-card" style="display:none;">
            <span class="status-tag tag-transfer">轉移中</span>
            <div class="card-info">
                <h3 id="transfer-item-name"></h3>
                <p>接收對象：<span id="target-email-display"></span></p>
                <p>申請時間：<span class="current-time"></span></p>
            </div>
            <button class="btn-outline-red" onclick="cancelTransfer()">取消轉移</button>
        </div>
        <div class="esim-card">
            <span class="status-tag tag-expired">已轉移</span>
            <div class="card-info">
                <h3>新加坡 - 1天</h3>
                <p>完成時間：2026-03-01</p>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="transferModal">
        <div class="modal">
            <h3>轉移 eSIM</h3>
            <p id="transfer-confirm-msg" style="font-size:13px; color:#666;"></p>
            <input type="email" id="transferEmail" placeholder="例如: 123@gmail.com">
            <button class="btn-main" onclick="checkMember()">確認轉移</button>
            <p style="margin:15px 0; font-size:12px; color:#999;">— 或 —</p>
            <button class="btn-sub" onclick="shareLink()">使用連結分享</button>
            <button class="btn-close-modal" onclick="closeModal('transferModal')" style="border:none; background:none; color:#999; margin-top:10px; cursor:pointer;">取消</button>
        </div>
    </div>

    <div class="modal-overlay" id="nonMemberModal">
        <div class="modal">
            <h3 style="color:var(--red);">帳號非會員</h3>
            <p style="font-size:14px;">該帳號尚未註冊 2eSIM。<br>請分享快速註冊連結給對方，完成後將立即轉移。</p>
            <button class="btn-main" onclick="shareLink()">複製快速註冊連結</button>
            <button class="btn-close-modal" onclick="closeModal('nonMemberModal')" style="border:none; background:none; color:#999; margin-top:15px; cursor:pointer;">關閉</button>
        </div>
    </div>

    <script>
        let currentTransferringId = '';
        let currentTransferringName = '';

        const now = new Date();
        const formattedTime = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
        document.querySelectorAll('.current-time').forEach(el => el.innerText = formattedTime);

        function switchTab(idx) {
            document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', i === idx));
            document.querySelectorAll('.esim-list').forEach((l, i) => l.classList.toggle('active', i === idx));
        }

        function openTransferModal(id, name) {
            currentTransferringId = id;
            currentTransferringName = name;
            document.getElementById('transfer-confirm-msg').innerText = `正在轉移：${name}`;
            document.getElementById('transferModal').style.display = 'flex';
        }
        
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        function checkMember() {
            const email = document.getElementById('transferEmail').value;
            if (email === "123@gmail.com") {
                alert("驗證成功！正在轉移...");
                document.getElementById(currentTransferringId).style.display = 'none';
                document.getElementById('transfer-item-name').innerText = currentTransferringName;
                document.getElementById('target-email-display').innerText = email;
                document.getElementById('transferring-card').style.display = 'block';
                closeModal('transferModal');
                switchTab(2);
            } else {
                closeModal('transferModal');
                document.getElementById('nonMemberModal').style.display = 'flex';
            }
        }

        function shareLink() {
            alert("已複製連結：https://2esim.com/quick-register\n(對方完成註冊後將自動接收此 eSIM)");
            closeModal('nonMemberModal');
        }

        function cancelTransfer() {
            if(confirm("確定取消轉移？訂單將回到有效分類。")) {
                document.getElementById('transferring-card').style.display = 'none';
                document.getElementById(currentTransferringId).style.display = 'block';
                switchTab(0);
            }
        }

        function returnOrder(id) {
            if(confirm("確定退回此訂單給原轉移者？")) {
                document.getElementById(id).style.display = 'none';
                alert("已成功退回給原轉移者。");
            }
        }

        function openActiveModal() { alert("啟動安裝引導流程..."); }
    </script>
</body>
</html>
