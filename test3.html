<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2eSIM My eSIM V5.2</title>
    <style>
        :root { --brand-blue: #24819c; --bg-color: #f2f2f7; --status-yellow: #f2ba49; --red: #ff3b30; --green: #34C759; }
        body { font-family: -apple-system, sans-serif; background: var(--bg-color); margin: 0; padding: 0; color: #1c1c1e; }
        .tabs { display: flex; background: #e5e5ea; border-radius: 12px; margin: 15px; padding: 3px; position: sticky; top: 10px; z-index: 100; }
        .tab { flex: 1; padding: 12px; text-align: center; font-size: 14px; cursor: pointer; border-radius: 10px; color: #8e8e93; }
        .tab.active { background: var(--brand-blue); color: #fff; font-weight: bold; }
        
        .esim-list { padding: 0 15px; display: none; }
        .esim-list.active { display: block; }
        .esim-card { background: white; border-radius: 20px; padding: 20px; margin-bottom: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        
        .status-tag { display: inline-block; padding: 4px 10px; border-radius: 8px; font-size: 11px; font-weight: bold; margin-bottom: 12px; border: 1px solid; margin-right: 5px; }
        .tag-active { background: #fff9eb; color: var(--status-yellow); border-color: var(--status-yellow); }
        .tag-expired { background: #f2f2f7; color: #8e8e93; border-color: #d1d1d6; }
        .tag-transfer { background: #eef7ff; color: var(--brand-blue); border-color: var(--brand-blue); }

        .btn-main { background: var(--brand-blue); color: #fff; border: none; width: 100%; padding: 14px; border-radius: 25px; font-weight: bold; margin-top: 10px; cursor: pointer; }
        .btn-sub { background: #fff; color: var(--brand-blue); border: 1px solid var(--brand-blue); width: 100%; padding: 10px; border-radius: 25px; font-weight: bold; margin-top: 10px; cursor: pointer; }
        .btn-outline-red { background: #fff; color: var(--red); border: 1px solid var(--red); width: 100%; padding: 10px; border-radius: 25px; font-weight: bold; margin-top: 10px; cursor: pointer; }
        .btn-copy { background: var(--green); color: white; border: none; width: 100%; padding: 12px; border-radius: 12px; font-weight: bold; margin-top: 10px; cursor: pointer; }

        /* 彈窗 */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
        .modal { background: white; width: 100%; max-width: 320px; border-radius: 25px; padding: 25px; text-align: center; }
        .modal-icon { width: 40px; height: 40px; border: 2px solid var(--status-yellow); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 15px; color: var(--status-yellow); font-weight: bold; font-size: 24px; }
        .modal ul { text-align: left; font-size: 13px; line-height: 1.8; padding-left: 20px; margin-bottom: 20px; }

        /* 安裝引導頁面 */
        #install-guide { display: none; padding: 0 15px 50px; }
        .qr-section { margin: 20px 0; border: 2px dashed var(--brand-blue); padding: 12px; border-radius: 15px; text-align: center; background: #f9fdff; }
        .qr-image { width: 100%; border-radius: 10px; display: block; }
    </style>
</head>
<body>

    <h2 id="page-title" style="padding: 20px;">My eSIM</h2>

    <div class="tabs" id="main-tabs">
        <div class="tab active" onclick="switchTab(0)">有效</div>
        <div class="tab" onclick="switchTab(1)">失效</div>
        <div class="tab" onclick="switchTab(2)">轉移</div>
    </div>

    <div class="esim-list active" id="list-0">
        <div class="esim-card" id="card-my-skt">
            <span class="status-tag tag-active">尚未開通</span>
            <div class="card-info">
                <h3>南韓 - 7天不限量</h3>
                <p>截止開通：2026-04-10</p>
            </div>
            <button class="btn-main" onclick="openReminderModal('card-my-skt', '南韓 - 7天不限量')">立即開通</button>
            <button class="btn-sub" onclick="openTransferModal('card-my-skt', '南韓 - 7天不限量')">轉移 eSIM</button>
        </div>
        <div class="esim-card" id="card-received-jp">
            <span class="status-tag tag-active">尚未開通</span>
            <span class="status-tag tag-transfer">轉移</span>
            <div class="card-info">
                <h3>日本 - 5天 每日1GB (來自: Kevin)</h3>
                <p>截止開通：2026-03-30</p>
            </div>
            <button class="btn-main" onclick="openReminderModal('card-received-jp', '日本 - 5天')">立即開通</button>
            <button class="btn-sub" onclick="openTransferModal('card-received-jp', '日本 - 5天')">轉移 eSIM</button>
            <button class="btn-outline-red" onclick="returnOrder('card-received-jp')">退回</button>
        </div>
    </div>

    <div class="esim-list" id="list-1">
        <div class="esim-card"><span class="status-tag tag-expired">已退回</span><h3>泰國 - 10天</h3></div>
    </div>
    <div class="esim-list" id="list-2">
        <div class="esim-card" id="transferring-card" style="display:none;"><span class="status-tag tag-transfer">轉移中</span><h3 id="transfer-item-name"></h3><button class="btn-outline-red" onclick="cancelTransfer()">取消轉移</button></div>
    </div>

    <div class="modal-overlay" id="reminderModal">
        <div class="modal">
            <div class="modal-icon">!</div>
            <h2>貼心提醒</h2>
            <ul>
                <li>本方案有效時間將於抵達目的地國產生流量後，開始計算</li>
                <li>eSIM開通後只能於本裝置中使用</li>
                <li>開通 eSIM 需於網路環境下進行開通</li>
                <li>請務必於開通有效期內開通 eSIM</li>
            </ul>
            <button class="btn-main" onclick="goToInstallGuide()">繼續開通</button>
            <button class="btn-sub" style="border:none; color:#999;" onclick="closeModal('reminderModal')">取消開通</button>
        </div>
    </div>

    <div class="modal-overlay" id="transferModal">
        <div class="modal">
            <h3>轉移 eSIM</h3>
            <input type="email" id="transferEmail" placeholder="123@gmail.com">
            <button class="btn-main" onclick="checkMember()">確認轉移</button>
            <button class="btn-sub" style="border:none; color:#999;" onclick="closeModal('transferModal')">取消</button>
        </div>
    </div>

    <div id="install-guide">
        <div class="esim-card" style="text-align: center; margin: 15px;">
            <h3 id="installing-name">安裝引導</h3>
            <div class="qr-section"><img src="qr.jpg" class="qr-image"></div>
            <p style="font-size: 12px; color: #8e8e93;">請長按 QR Code 儲存至相簿</p>
            <button onclick="copy('rsp-ios.trillium.travel')" class="btn-copy">複製 SM-DP+ 位址</button>
            <button onclick="copy('8985207220081270553')" class="btn-copy">複製 啟用碼</button>
            <button onclick="location.reload()" class="btn-sub" style="margin-top:20px; border:none; color:#999;">← 返回清單</button>
        </div>
    </div>

    <script>
        let selectedId = '';
        let selectedName = '';

        function switchTab(idx) {
            document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', i === idx));
            document.querySelectorAll('.esim-list').forEach((l, i) => l.classList.toggle('active', i === idx));
            document.getElementById('install-guide').style.display = 'none';
        }

        function openReminderModal(id, name) {
            selectedId = id;
            selectedName = name;
            document.getElementById('reminderModal').style.display = 'flex';
        }

        function goToInstallGuide() {
            closeModal('reminderModal');
            document.getElementById('main-tabs').style.display = 'none';
            document.getElementById('list-0').style.display = 'none';
            document.getElementById('page-title').innerText = "安裝 eSIM";
            document.getElementById('installing-name').innerText = selectedName;
            document.getElementById('install-guide').style.display = 'block';
        }

        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        
        function copy(text) { navigator.clipboard.writeText(text).then(() => alert("✅ 已複製到剪貼簿")); }

        function openTransferModal(id, name) {
            selectedId = id; selectedName = name;
            document.getElementById('transferModal').style.display = 'flex';
        }

        function checkMember() {
            const email = document.getElementById('transferEmail').value;
            if (email === "123@gmail.com") {
                document.getElementById(selectedId).style.display = 'none';
                document.getElementById('transfer-item-name').innerText = selectedName;
                document.getElementById('transferring-card').style.display = 'block';
                closeModal('transferModal'); switchTab(2);
            } else { alert("帳號非會員，請使用連結分享。"); }
        }

        function cancelTransfer() {
            document.getElementById('transferring-card').style.display = 'none';
            document.getElementById(selectedId).style.display = 'block';
            switchTab(0);
        }
    </script>
</body>
</html>
