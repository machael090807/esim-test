<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2eSIM 系統跳轉測試</title>
    <style>
        body { font-family: -apple-system, sans-serif; padding: 20px; text-align: center; line-height: 1.6; }
        .btn { display: block; width: 100%; padding: 15px; margin: 12px 0; border: none; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; text-decoration: none; color: white; }
        .btn-blue { background-color: #007AFF; }
        .btn-orange { background-color: #FF9500; }
        .btn-green { background-color: #34C759; }
        .note { font-size: 13px; color: #666; background: #eee; padding: 10px; border-radius: 8px; }
    </style>
</head>
<body>

    <h2>2eSIM 系統跳轉實測</h2>
    
    <a href="App-prefs:MOBILE_DATA_SETTINGS_ID" class="btn btn-blue">
        試試 1：跳轉至行動服務 (prefs)
    </a>

    <a href="https://2esim.com/setup?bytesimdata=LPA:1$smdp.address$TEST123456" class="btn btn-orange">
        試試 2：模擬 Apple Universal Link
    </a>

    <button onclick="copyAndOpen()" class="btn btn-green">
        試試 3：自動複製代碼並嘗試開啟
    </button>

    <div class="note">
        <strong>QA 測試說明：</strong><br>
        1. 若出現「網址無效」，代表該版本 iOS 封鎖了瀏覽器的 prefs 權限。<br>
        2. 若試試 2 有反應，代表系統識別了 eSIM 安裝協議。
    </div>

    <script>
        function copyAndOpen() {
            const code = "LPA:1$smdp.address$TEST123456";
            navigator.clipboard.writeText(code).then(() => {
                alert("✅ 代碼已複製！請點擊確定嘗試開啟設定。");
                // 嘗試多種跳轉路徑
                window.location.href = "App-prefs:root=MOBILE_DATA_SETTINGS_ID";
            });
        }
    </script>
</body>
</html>
