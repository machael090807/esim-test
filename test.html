<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2eSIM 極速安裝實測</title>
    <style>
        /* 採用 iOS 18 簡約風格 */
        body { font-family: -apple-system, sans-serif; padding: 20px; text-align: center; background: #f2f2f7; color: #1c1c1e; }
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 8px 30px rgba(0,0,0,0.1); max-width: 360px; margin: auto; }
        .qr-section { background: #fff; padding: 10px; border: 2px solid #007AFF; border-radius: 15px; margin: 20px 0; }
        .qr-image { width: 100%; border-radius: 10px; display: block; }
        
        .btn { display: block; width: 100%; padding: 15px; margin: 10px 0; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; text-decoration: none; color: white; transition: 0.2s; }
        .btn-blue { background-color: #007AFF; }
        .btn-green { background-color: #34C759; }
        .btn:active { opacity: 0.7; transform: scale(0.98); }

        .copy-group { background: #f9f9fb; padding: 15px; border-radius: 15px; border: 1px solid #d1d1d6; margin-top: 20px; text-align: left; }
        .field-label { font-size: 12px; color: #8e8e93; margin-bottom: 4px; display: block; }
        
        .guide-box { display: none; text-align: left; background: #eef7ff; padding: 15px; border-radius: 12px; margin-top: 20px; font-size: 14px; border-left: 5px solid #007AFF; }
        hr { border: 0.5px solid #d1d1d6; margin: 15px 0; }
    </style>
</head>
<body>

<div class="card">
    <h2>2eSIM 安裝導引</h2>
    <p style="font-size: 14px; color: #8e8e93;">單機安裝：長按儲存 或 分段複製</p>
    
    <div class="qr-section">
        <img src="2026-03-10 17.43.13.jpg" alt="eSIM QR Code" class="qr-image" id="mainQR">
    </div>

    <button onclick="showStep('photo')" class="btn btn-blue">📸 1. 長按圖片儲存並導入</button>

    <div class="copy-group">
        <p style="font-size: 14px; font-weight: bold; margin-bottom: 10px;">📋 2. 手動輸入（對應設定欄位）</p>
        
        <span class="field-label">對應「SM-DP+ 位址」</span>
        <button onclick="copyField('rsp-ios.trillium.travel')" class="btn btn-green" style="padding: 10px; font-size: 14px;">複製 SM-DP+ 位址</button>
        
        <span class="field-label" style="margin-top: 10px;">對應「啟用碼」</span>
        <button onclick="copyField('8985207220081270553')" class="btn btn-green" style="padding: 10px; font-size: 14px;">複製 啟用碼</button>
    </div>

    <div id="instruction" class="guide-box">
        <strong>💡 操作教學：</strong><br>
        1. 前往 <b>設定 > 行動服務</b>。<br>
        2. 點選 <b>加入 eSIM > 使用 QR 碼</b>。<br>
        3. <b>相簿法</b>：點選下方「開啟照片」選取剛存的圖。<br>
        4. <b>貼上法</b>：點選「手動輸入詳細資訊」，將上方複製的內容貼入對應欄位。
    </div>
</div>

<script>
    function showStep(type) {
        alert("請長按圖片選擇「儲存影像」。\n儲存後，請參考下方步驟至系統設定安裝。");
        document.getElementById('instruction').style.display = 'block';
    }

    function copyField(text) {
        navigator.clipboard.writeText(text).then(() => {
            alert("✅ 已複製內容：\n" + text + "\n\n請至系統設定頁面貼上。");
            document.getElementById('instruction').style.display = 'block';
        });
    }
</script>

</body>
</html>
